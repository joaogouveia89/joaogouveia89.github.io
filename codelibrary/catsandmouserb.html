    <title>Cats And Mouse - Ruby</title>

<body class="dark-theme">
    <code>
        <pre>
def catAndMouse(x, y, z)
    distA = (x - z).abs
    distB = (y - z).abs
    if distA == distB
        "Mouse C"
    elsif distA < distB
        "Cat A"
    else
        "Cat B"
    end
end
    </pre>
