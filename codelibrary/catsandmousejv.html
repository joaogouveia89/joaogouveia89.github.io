<body class="dark-theme">
    <code>
        <pre>
static String catAndMouse(int x, int y, int z) {
    int distA = Math.abs(x - z);
    int distB = Math.abs(y - z);
    
    if(distA == distB){
        return "Mouse C";
    }else if(distA &lt; distB){
        return "Cat A";
    }else{
        return "Cat B";
    }
}
    </pre>
